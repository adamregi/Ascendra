rules:
  - id: R001
    name: No Business Logic In Widgets
    description: UI widgets must not directly fetch data or mutate the database.
    detect:
      folder: "lib/**/presentation/**"
      extensions: [".dart"]
    forbid:
      - "Supabase.instance.client"
      - "select("
      - "insert("
      - "RepositoryImpl"
    allow:
      - "ViewModel"
      - "Provider"
      - "ref.watch("
      - "ref.read("

  - id: R002
    name: No UI Logic In Repositories
    description: Data layer repositories must not know about Flutter UI constructs.
    detect:
      folder: "lib/**/data/**"
      extensions: [".dart"]
    forbid:
      - "dart:ui"
      - "flutter/material.dart"
      - "BuildContext"
      - "Navigator"
    allow:
      - "dart:convert"
      - "package:dio/dio.dart"

  - id: R003
    name: Always Enforce RLS on RPCs
    description: Backend-for-frontend RPCs must execute with the caller's privileges.
    detect:
      folder: "supabase/migrations/**"
      extensions: [".sql"]
      regex: "CREATE OR REPLACE FUNCTION"
    forbid:
      - "security definer"
    allow:
      - "security invoker"
      
  - id: R004
    name: Use Serene Modernist Tokens
    description: Hardcoded colors and magic numbers are forbidden in the UI layer.
    detect:
      folder: "lib/**/presentation/**"
      extensions: [".dart"]
    forbid:
      - "Color(0xFF"
    allow:
      - "AppColors."
      - "AppTypography."
      - "AppSpacing."

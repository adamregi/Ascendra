<!DOCTYPE html>

<html class="light" lang="en" style=""><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Ascendra - Create Leader Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Newsreader:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f6f3f1",
                        "inverse-surface": "#313030",
                        "secondary-container": "#d6e7d9",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#f1dedf",
                        "surface-dim": "#dcd9d8",
                        "on-secondary-fixed": "#111e16",
                        "surface-container-highest": "#e5e2e0",
                        "surface-bright": "#fcf9f7",
                        "on-error-container": "#93000a",
                        "surface-tint": "#5a605a",
                        "primary-fixed-dim": "#c2c8c1",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#a69697",
                        "surface-container-high": "#ebe7e6",
                        "on-surface": "#1c1c1b",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#424843",
                        "on-secondary-container": "#59685d",
                        "surface-variant": "#e5e2e0",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#dee4dd",
                        "tertiary-container": "#3a2f30",
                        "on-background": "#1c1c1b",
                        "secondary-fixed-dim": "#bacbbe",
                        "inverse-primary": "#c2c8c1",
                        "tertiary": "#241a1b",
                        "tertiary-fixed-dim": "#d4c2c3",
                        "primary": "#181e1a",
                        "on-tertiary-fixed-variant": "#504445",
                        "secondary": "#536257",
                        "outline": "#747873",
                        "on-primary-container": "#959b94",
                        "secondary-fixed": "#d6e7d9",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#3b4a40",
                        "inverse-on-surface": "#f3f0ef",
                        "on-surface-variant": "#444844",
                        "primary-container": "#2d332e",
                        "surface": "#fcf9f7",
                        "outline-variant": "#c4c7c2",
                        "on-tertiary-fixed": "#23191a",
                        "surface-container": "#f0edec",
                        "on-primary-fixed": "#171d18",
                        "error-container": "#ffdad6",
                        "background": "#fcf9f7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Newsreader", "serif"],
                        "display": ["Newsreader", "serif"],
                        "body": ["Hanken Grotesk", "sans-serif"],
                        "label": ["Hanken Grotesk", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .input-ring-transition { transition: box-shadow 0.2s ease-in-out, border-color 0.2s ease-in-out; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface-bright dark:bg-surface-dim text-primary dark:text-primary-fixed font-body text-body-md w-full top-0 border-b border-outline-variant dark:border-outline flat no shadows sticky z-50">
<div class="flex items-center justify-between px-6 py-4 max-w-[1200px] mx-auto">
<button aria-label="Go back" class="flex items-center justify-center p-2 -ml-2 text-on-surface-variant hover:text-primary transition-colors rounded-full active:bg-surface-container-high">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline text-headline-sm font-semibold text-primary dark:text-primary-fixed">Create Leader Account</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto px-6 py-8 pb-32">
<form class="space-y-8" id="registrationForm">
<!-- Section: Your Info -->
<section class="space-y-5">
<h2 class="text-label-md font-semibold text-on-surface-variant uppercase tracking-wider mb-2">Your Info</h2>
<div class="space-y-1.5">
<label class="text-label-sm text-on-surface-variant font-medium" for="fullName">FULL NAME</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-xl h-[52px] px-4 text-body-md focus:border-primary focus:ring-1 focus:ring-primary input-ring-transition outline-none" id="fullName" placeholder="e.g. Vignesh Kumar" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-label-sm text-on-surface-variant font-medium" for="phone">PHONE NUMBER</label>
<div class="flex gap-2">
<div class="flex items-center justify-center bg-surface-container-low border border-outline-variant rounded-xl h-[52px] px-3 w-24 shrink-0 text-body-md">
<span class="mr-1 text-lg">🇮🇳</span>
<span class="">+91</span>
</div>
<input class="flex-1 bg-surface-container-low border border-outline-variant rounded-xl h-[52px] px-4 text-body-md focus:border-primary focus:ring-1 focus:ring-primary input-ring-transition outline-none" id="phone" placeholder="98765 43210" type="tel"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-label-sm text-on-surface-variant font-medium" for="email">EMAIL</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-xl h-[52px] px-4 text-body-md focus:border-primary focus:ring-1 focus:ring-primary input-ring-transition outline-none" id="email" placeholder="vignesh@example.com" type="email"/>
</div>
<div class="space-y-1.5">
<label class="text-label-sm text-on-surface-variant font-medium" for="password">PASSWORD</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-xl h-[52px] px-4 pr-12 text-body-md focus:border-primary focus:ring-1 focus:ring-primary input-ring-transition outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center" id="togglePassword" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</section>
<div class="w-full h-px bg-outline-variant/30 my-2"></div>
<!-- Section: Your Company -->
<section class="space-y-5">
<h2 class="text-label-md font-semibold text-on-surface-variant uppercase tracking-wider mb-2">Your Company</h2>
<div class="space-y-1.5">
<label class="text-label-sm text-on-surface-variant font-medium" for="companyName">COMPANY NAME</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-xl h-[52px] px-4 text-body-md focus:border-primary focus:ring-1 focus:ring-primary input-ring-transition outline-none" id="companyName" placeholder="e.g. Team Vignesh" type="text"/>
<div class="flex items-center gap-1.5 mt-1 text-sm font-mono text-outline">
<span class="material-symbols-outlined text-[16px]" data-icon="link">link</span>
<span class="">ascendra.app/<span class="text-secondary font-medium" id="slugPreview">slug</span></span>
</div>
</div>
<div class="space-y-1.5">
<label class="text-label-sm text-on-surface-variant font-medium" for="mlmCompany">AFFILIATED NETWORK</label>
<div class="relative">
<select class="w-full bg-surface-container-low border border-outline-variant rounded-xl h-[52px] px-4 pr-10 text-body-md focus:border-primary focus:ring-1 focus:ring-primary input-ring-transition outline-none appearance-none bg-transparent" id="mlmCompany">
<option disabled="" selected="" value="">Select an option</option>
<option value="amway">Amway</option>
<option value="vestige">Vestige</option>
<option value="modicare">Modicare</option>
<option value="other">Other</option>
</select>
</div>
</div>
</section>
<!-- Terms -->
<p class="text-label-sm text-center text-on-surface-variant pt-4 pb-2">
                By creating an account you agree to our <a class="text-primary font-semibold hover:underline" href="#">Terms</a> &amp; <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>
</p>
</form>
</main>
<!-- Sticky Bottom CTA -->
<div class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-md border-t border-outline-variant/30 pb-safe pt-4 px-6 pb-6 z-40">
<div class="max-w-md mx-auto">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-[16px] font-label text-label-md hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center shadow-md" type="button">
                Create My Account
            </button>
</div>
</div>
<script>
        // Toggle password visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.querySelector('span').textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        // Slug generator
        const companyNameInput = document.getElementById('companyName');
        const slugPreview = document.getElementById('slugPreview');

        companyNameInput.addEventListener('input', function() {
            const name = this.value;
            if (name.trim() === '') {
                slugPreview.textContent = 'slug';
                slugPreview.classList.remove('text-primary');
                slugPreview.classList.add('text-secondary');
            } else {
                const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
                slugPreview.textContent = slug;
                slugPreview.classList.add('text-primary');
                slugPreview.classList.remove('text-secondary');
            }
        });
    </script>
</body></html>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // Apply stagger animations
        if (!prefersReducedMotion) {
            document.querySelectorAll('.stagger-item').forEach((el) => {
                el.classList.add('animate-slide-up-fade');
            });

            // Spring scale for QR
            const qrContainer = document.querySelector('.qr-container');
            if(qrContainer) {
                setTimeout(() => {
                    qrContainer.classList.add('animate-spring-scale');
                }, 150);
            }

            // Stagger recent invites
            const recentItems = document.querySelectorAll('.recent-item');
            recentItems.forEach((item, index) => {
                setTimeout(() => {
                    item.style.opacity = '1';
                    item.style.transform = 'translateY(0)';
                }, 700 + (index * 150));
            });
        } else {
            document.querySelectorAll('.stagger-item').forEach(el => el.style.opacity = 1);
            const qrContainer = document.querySelector('.qr-container');
            if(qrContainer) qrContainer.style.opacity = 1;
            document.querySelectorAll('.recent-item').forEach(el => {
                el.style.opacity = 1;
                el.style.transform = 'none';
            });
        }

        // Copy Code Interaction
        const copyBtn = document.getElementById('copyCodeBtn');
        const copyIcon = document.getElementById('copyIcon');
        const copyText = document.getElementById('copyText');
        
        if(copyBtn) {
            copyBtn.addEventListener('click', function() {
                // Haptic scale effect
                this.style.transform = 'scale(0.95)';
                setTimeout(() => this.style.transform = 'scale(1)', 150);

                copyIcon.innerHTML = 'check';
                copyIcon.style.fontVariationSettings = "'FILL' 1";
                copyText.innerHTML = 'Copied';
                this.classList.add('bg-secondary', 'text-on-secondary');
                this.classList.remove('bg-primary', 'text-on-primary');
                
                setTimeout(() => {
                    copyIcon.innerHTML = 'content_copy';
                    copyIcon.style.fontVariationSettings = "'FILL' 0";
                    copyText.innerHTML = 'Copy';
                    this.classList.remove('bg-secondary', 'text-on-secondary');
                    this.classList.add('bg-primary', 'text-on-primary');
                }, 2000);
            });
        }

        // Expiry Control Slider
        const expiryBtns = document.querySelectorAll('.expiry-btn');
        const indicator = document.getElementById('expiryIndicator');
        
        if (expiryBtns.length && indicator) {
            expiryBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // Reset all
                    expiryBtns.forEach(b => {
                        b.classList.remove('font-semibold', 'active');
                        b.classList.add('font-medium');
                    });
                    
                    // Set active
                    this.classList.add('font-semibold', 'active');
                    this.classList.remove('font-medium');
                    
                    // Move indicator
                    const index = parseInt(this.getAttribute('data-index'));
                    // Using percentage based on 4 buttons. (25% per button)
                    // The indicator width is 25% - padding, so translation is simple:
                    indicator.style.transform = `translateX(${index * 100}%)`;
                });
            });
        }

        // Counter Animation
        const counters = document.querySelectorAll('.counter');
        const duration = 1000; // 1 second
        
        if (!prefersReducedMotion && counters.length > 0) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const target = parseInt(entry.target.getAttribute('data-target'));
                        const startTime = performance.now();
                        
                        const updateCounter = (currentTime) => {
                            const elapsed = currentTime - startTime;
                            const progress = Math.min(elapsed / duration, 1);
                            
                            // Easing easeOutQuart
                            const easeProgress = 1 - Math.pow(1 - progress, 4);
                            const current = Math.floor(easeProgress * target);
                            
                            entry.target.innerText = current;
                            
                            if (progress < 1) {
                                requestAnimationFrame(updateCounter);
                            } else {
                                entry.target.innerText = target;
                            }
                        };
                        
                        requestAnimationFrame(updateCounter);
                        observer.unobserve(entry.target);
                    }
                });
            });
            
            counters.forEach(counter => observer.observe(counter));
        } else {
             counters.forEach(counter => {
                 counter.innerText = counter.getAttribute('data-target');
             });
        }
    });
</script>

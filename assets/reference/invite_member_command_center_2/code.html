<body class="bg-background text-on-background antialiased min-h-screen flex flex-col relative overflow-x-hidden pb-24">
<!-- TopAppBar -->
<header class="bg-surface/80 backdrop-blur-md text-primary font-headline-md text-headline-md docked full-width top-0 sticky z-50 shadow-sm shadow-primary/5 border-b border-white/20">
<div class="flex items-center justify-between px-5 py-4 w-full max-w-[1200px] mx-auto">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/30 transition-colors duration-200 active:scale-95 text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline font-semibold text-xl tracking-tight text-primary absolute left-1/2 -translate-x-1/2">Invite Member</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="flex-1 w-full max-w-md mx-auto px-5 py-6 space-y-8">
<!-- Hero QR Card -->
<section class="glass-panel rounded-3xl p-6 flex flex-col items-center justify-center space-y-4 shadow-sm shadow-primary/5">
<div class="text-center space-y-1 mb-2">
<p class="font-label text-xs font-semibold text-on-surface-variant tracking-widest uppercase">Scan to Join</p>
<h2 class="font-headline text-2xl font-medium text-primary">Vignesh's Global Branch</h2>
</div>
<div class="bg-surface-container-lowest p-4 rounded-2xl shadow-sm border border-border-subtle relative overflow-hidden group w-60 h-60 flex items-center justify-center">
<!-- Decorative scan line -->
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-primary/5 to-transparent h-full w-full opacity-0 group-hover:opacity-100 group-hover:animate-[scan_2s_ease-in-out_infinite] pointer-events-none"></div>
<!-- Mock QR Code (using a detailed placeholder image to represent it professionally) -->
<img alt="QR Code" class="w-full h-full object-cover rounded-xl" data-alt="A highly crisp, minimalist representation of a QR code generated with stark black squares on a pure white background. It is framed perfectly in a square aspect ratio. The lighting is bright and even, fitting a pristine modern user interface. Subtle gradients or branding elements might be faintly visible within the matrix, suggesting a high-tech, secure data transfer mechanism." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB8ynjMjfA2Sgme6fVL_DNpbejytZTRsWL-7nXVr4eRwhJRJHjFNmIJKL-kfjiyrKnFtBNe0nY1wydtkwXNZUjm6wSoAsRfiyD9wlEJ7nLGQNnWqe6ooemnzUywCrfu5UZpGSMD_gwwsD7HhYM10basieOu7QUJKUqVnDhuDN-cQEtx2yWVqcC--rPDv4FfG311txVRzhTmRDVxHJ6hLn9B3Deyg3b-W1l8jW6ejIyE1VNXApQxIWhPrPxgAwKPxS0fuolDczwUI5ri"/>
</div>
<div class="flex items-center gap-2 text-on-surface-variant mt-2">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-body text-sm">Secure Ascendra Link</span>
</div>
</section>
<!-- Invite Code Section -->
<section class="space-y-3">
<label class="font-label text-sm font-semibold text-on-surface-variant pl-1">Direct Invite Code</label>
<div class="glass-panel rounded-2xl flex items-center justify-between p-2 pl-5 shadow-sm">
<span class="font-mono text-xl font-semibold tracking-wider text-primary">TEAM-X7K2M9</span>
<button class="bg-primary text-on-primary font-label text-sm px-5 py-3 rounded-xl hover:bg-primary-container transition-all active:scale-95 flex items-center gap-2" id="copyCodeBtn">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">content_copy</span>
                    Copy
                </button>
</div>
</section>
<!-- Share Actions -->
<section class="grid grid-cols-4 gap-4">
<button class="flex flex-col items-center gap-2 group active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center group-hover:bg-primary group-hover:text-on-primary transition-colors text-primary shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">chat</span>
</div>
<span class="font-label text-xs text-on-surface-variant font-medium">Message</span>
</button>
<button class="flex flex-col items-center gap-2 group active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center group-hover:bg-primary group-hover:text-on-primary transition-colors text-primary shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">mail</span>
</div>
<span class="font-label text-xs text-on-surface-variant font-medium">Email</span>
</button>
<button class="flex flex-col items-center gap-2 group active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center group-hover:bg-primary group-hover:text-on-primary transition-colors text-primary shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">link</span>
</div>
<span class="font-label text-xs text-on-surface-variant font-medium">Copy Link</span>
</button>
<button class="flex flex-col items-center gap-2 group active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center group-hover:bg-primary group-hover:text-on-primary transition-colors text-primary shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">more_horiz</span>
</div>
<span class="font-label text-xs text-on-surface-variant font-medium">More</span>
</button>
</section>
<hr class="border-border-subtle"/>
<!-- Expiry Control -->
<section class="space-y-3">
<div class="flex justify-between items-center pl-1">
<label class="font-label text-sm font-semibold text-on-surface-variant">Link Expiry</label>
<span class="font-body text-xs text-outline">For 'TEAM-X7K2M9'</span>
</div>
<div class="bg-surface-container-high p-1 rounded-xl flex">
<button class="flex-1 py-2 font-label text-sm font-medium rounded-lg text-on-surface-variant hover:text-primary transition-colors">24h</button>
<button class="flex-1 py-2 font-label text-sm font-medium rounded-lg text-on-surface-variant hover:text-primary transition-colors">7d</button>
<button class="flex-1 py-2 font-label text-sm font-semibold rounded-lg bg-surface-container-lowest text-primary shadow-sm transition-all">30d</button>
<button class="flex-1 py-2 font-label text-sm font-medium rounded-lg text-on-surface-variant hover:text-primary transition-colors">Never</button>
</div>
</section>
</main>
<script>
        // Simple copy interaction
        document.getElementById('copyCodeBtn').addEventListener('click', function() {
            const btn = this;
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check</span> Copied`;
            btn.classList.add('bg-secondary', 'text-on-secondary');
            btn.classList.remove('bg-primary', 'text-on-primary');
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.classList.remove('bg-secondary', 'text-on-secondary');
                btn.classList.add('bg-primary', 'text-on-primary');
            }, 2000);
        });

        // Animation for scan line
        tailwind.config.theme.extend.keyframes = {
            ...tailwind.config.theme.extend.keyframes,
            scan: {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(100%)' },
            }
        }
    </script>
</body></html>

<style>

          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

          font-variation-settings: 'FILL' 1;

<body class="bg-[#FCF9F7] text-on-background font-body min-h-screen flex flex-col items-center justify-center p-6 md:p-12 pb-32">
<!-- Suppressed Shell: Linear/Transactional Intent (Meeting Ended Splash Screen) -->
<!-- The TopAppBar and BottomNavBar are deliberately omitted as per the "Shell Visibility & Relevance" rule. -->
<main class="summary-container w-full max-w-2xl bg-surface-container-lowest rounded-xl shadow-sm border border-surface-container overflow-hidden">
<!-- Header & Hero -->
<div class="p-8 md:p-12 flex flex-col items-center text-center border-b border-surface-container bg-surface-bright relative overflow-hidden">
<!-- Decorative gradient backdrop -->
<div class="absolute top-0 left-0 right-0 h-32 bg-gradient-to-b from-secondary-container/30 to-transparent pointer-events-none"></div>
<div class="success-icon w-16 h-16 rounded-full bg-accent-emerald flex items-center justify-center text-white mb-6 relative z-10 shadow-sm">
<span class="material-symbols-outlined text-3xl filled" data-icon="check">check</span>
</div>
<h1 class="font-headline font-bold text-headline-md md:text-display-lg-mobile text-primary mb-2 relative z-10 tracking-tight">Meeting Ended</h1>
<p class="font-body text-body-lg text-on-surface-variant relative z-10">Branch Strategy: Q3 Planning</p>
<div class="mt-10 relative z-10">
<div class="font-mono font-bold text-5xl md:text-6xl text-primary tracking-tighter"><span class="stat-number">1</span>h <span class="stat-number">12</span>m</div>
<div class="font-label font-semibold text-label-md text-on-surface-variant uppercase tracking-wider mt-2">Duration</div>
</div>
</div>
<!-- Stats Row -->
<div class="p-8 grid grid-cols-3 gap-4 md:gap-6 bg-surface-container-lowest">
<!-- Joined Card -->
<div class="bg-surface-bright rounded-lg p-4 border-t-4 border-accent-emerald shadow-sm flex flex-col items-center text-center">
<span class="material-symbols-outlined text-accent-emerald mb-2" data-icon="group">group</span>
<div class="font-mono font-bold text-3xl text-primary mb-1 stat-number">18</div>
<div class="font-label text-label-sm text-on-surface-variant">Joined</div>
</div>
<!-- Missed Card -->
<div class="bg-surface-bright rounded-lg p-4 border-t-4 border-accent-amber shadow-sm flex flex-col items-center text-center">
<span class="material-symbols-outlined text-accent-amber mb-2" data-icon="person_off">person_off</span>
<div class="font-mono font-bold text-3xl text-primary mb-1 stat-number">5</div>
<div class="font-label text-label-sm text-on-surface-variant">Missed</div>
</div>
<!-- Attended Card -->
<div class="bg-surface-bright rounded-lg p-4 border-t-4 border-primary shadow-sm flex flex-col items-center text-center">
<span class="material-symbols-outlined text-primary mb-2" data-icon="percent">percent</span>
<div class="font-mono font-bold text-3xl text-primary mb-1 stat-number">78%</div>
<div class="font-label text-label-sm text-on-surface-variant">Attendance</div>
</div>
</div>
<!-- Insights -->
<div class="px-8 pb-8 flex flex-col gap-4">
<!-- Compliance -->
<div class="bg-surface-container-low rounded-lg p-4 flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container shrink-0">
<span class="material-symbols-outlined filled" data-icon="verified">verified</span>
</div>
<div>
<h3 class="font-label font-semibold text-label-md text-primary">Compliance Met</h3>
<p class="font-body text-body-md text-on-surface-variant">14 of 18 members reached minimum duration</p>
</div>
</div>
<!-- Recording -->
<div class="bg-surface-container-low rounded-lg p-4 flex items-center gap-4 border border-accent-teal/20">
<div class="w-10 h-10 rounded-full bg-accent-teal/10 flex items-center justify-center text-accent-teal shrink-0">
<span class="material-symbols-outlined" data-icon="cloud_download">cloud_download</span>
</div>
<div class="flex-grow">
<h3 class="font-label font-semibold text-label-md text-primary">Recording ready</h3>
<p class="font-body text-body-md text-on-surface-variant">Available for playback and download</p>
</div>
</div>
</div>
<!-- Actions -->
<div class="p-8 pt-4 border-t border-surface-container bg-surface-container-lowest flex flex-col sm:flex-row gap-4 justify-end">
<button class="px-6 py-3 rounded-full border border-outline text-on-surface font-label font-semibold text-label-md hover:bg-surface-container transition-colors order-2 sm:order-1 flex items-center justify-center gap-2">
                Back to Home
            </button>
<button class="px-6 py-3 rounded-full bg-primary text-on-primary font-label font-semibold text-label-md hover:bg-primary/90 transition-colors shadow-md order-1 sm:order-2 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="bar_chart">bar_chart</span>
                View Full Report
            </button>
</div>
</main>
<script>
(function() {
  // Staggered entry animation for elements
  const container = document.querySelector('.summary-container');
  if (container) {
    container.style.opacity = '0';
    container.style.transform = 'translateY(20px)';
    container.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
    
    setTimeout(() => {
      container.style.opacity = '1';
      container.style.transform = 'translateY(0)';
    }, 100);
  }

  // Count up animation for stats
  function animateValue(obj, start, end, duration) {
    let startTimestamp = null;
    const step = (timestamp) => {
      if (!startTimestamp) startTimestamp = timestamp;
      const progress = Math.min((timestamp - startTimestamp) / duration, 1);
      const value = Math.floor(progress * (end - start) + start);
      obj.innerHTML = value + (obj.dataset.suffix || '');
      if (progress < 1) {
        window.requestAnimationFrame(step);
      }
    };
    window.requestAnimationFrame(step);
  }

  const stats = document.querySelectorAll('.stat-number');
  stats.forEach((stat, index) => {
    const endValue = parseInt(stat.innerHTML);
    stat.dataset.suffix = stat.innerHTML.includes('%') ? '%' : '';
    stat.innerHTML = '0';
    setTimeout(() => {
      animateValue(stat, 0, endValue, 1000);
    }, 400 + (index * 150));
  });

  // Confetti-light burst from checkmark
  const checkmark = document.querySelector('.success-icon');
  if (checkmark) {
    const burst = document.createElement('div');
    burst.className = 'burst-effect';
    checkmark.appendChild(burst);
    
    // Simple pulse every 8s
    setInterval(() => {
      checkmark.classList.add('pulse');
      setTimeout(() => checkmark.classList.remove('pulse'), 2000);
    }, 8000);
  }

  const style = document.createElement('style');
  style.innerHTML = `
    .stat-number { transition: all 0.3s ease; }
    .success-icon.pulse {
      animation: icon-pulse 2s ease-in-out;
    }
    @keyframes icon-pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); filter: brightness(1.1); }
      100% { transform: scale(1); }
    }
    .burst-effect {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
      animation: burst 1s ease-out forwards;
    }
    @keyframes burst {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
    }
  `;
  document.head.appendChild(style);
})();
</script>
</body></html>

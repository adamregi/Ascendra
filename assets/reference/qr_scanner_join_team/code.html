<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QR Scanner Overlay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&amp;family=Newsreader:opsz,wght@6..72,500;6..72,600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "background": "#fcf9f7",
                      "tertiary-fixed-dim": "#d4c2c3",
                      "on-tertiary": "#ffffff",
                      "on-error": "#ffffff",
                      "surface-dim": "#dcd9d8",
                      "on-primary-container": "#959b94",
                      "surface-container-low": "#f6f3f1",
                      "inverse-surface": "#313030",
                      "secondary-fixed": "#d6e7d9",
                      "on-tertiary-fixed-variant": "#504445",
                      "on-secondary-fixed-variant": "#3b4a40",
                      "surface-variant": "#e5e2e0",
                      "tertiary-container": "#3a2f30",
                      "on-surface-variant": "#444844",
                      "secondary-container": "#d6e7d9",
                      "primary": "#181e1a",
                      "on-surface": "#1c1c1b",
                      "tertiary-fixed": "#f1dedf",
                      "on-secondary-container": "#59685d",
                      "on-secondary": "#ffffff",
                      "on-primary-fixed-variant": "#424843",
                      "secondary": "#536257",
                      "on-error-container": "#93000a",
                      "tertiary": "#241a1b",
                      "secondary-fixed-dim": "#bacbbe",
                      "surface-tint": "#5a605a",
                      "surface": "#fcf9f7",
                      "surface-bright": "#fcf9f7",
                      "on-tertiary-fixed": "#23191a",
                      "on-secondary-fixed": "#111e16",
                      "surface-container-high": "#ebe7e6",
                      "error-container": "#ffdad6",
                      "inverse-primary": "#c2c8c1",
                      "error": "#ba1a1a",
                      "primary-fixed": "#dee4dd",
                      "outline-variant": "#c4c7c2",
                      "on-tertiary-container": "#a69697",
                      "surface-container-lowest": "#ffffff",
                      "surface-container-highest": "#e5e2e0",
                      "surface-container": "#f0edec",
                      "on-primary": "#ffffff",
                      "on-primary-fixed": "#171d18",
                      "inverse-on-surface": "#f3f0ef",
                      "on-background": "#1c1c1b",
                      "primary-fixed-dim": "#c2c8c1",
                      "primary-container": "#2d332e",
                      "outline": "#747873",
                      "accent-warm": "#D4AF37"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": [
                              "Newsreader", "serif"
                      ],
                      "display": [
                              "Newsreader", "serif"
                      ],
                      "body": [
                              "Hanken Grotesk", "sans-serif"
                      ],
                      "label": [
                              "Hanken Grotesk", "sans-serif"
                      ]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes scanline {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .animate-scanline {
            animation: scanline 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* 
         * Using a massive box shadow on the scanning cutout to create the semi-transparent 
         * dark overlay without needing complex SVG masks.
         */
        .scanner-cutout {
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.65);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black antialiased h-[884px] w-full overflow-hidden relative font-body select-none">
<!-- Simulated Camera Feed Background -->
<div class="absolute inset-0 z-0 bg-cover bg-center" data-alt="A blurred, slightly desaturated view through a mobile phone camera lens of a modern office desk setup. The focus is soft, showing hints of a laptop edge, a notebook, and soft ambient lighting, creating a realistic backdrop for an augmented reality or scanning overlay. The mood is professional and tech-forward." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCnoh2qOw82oIxb-imKlbkdY8Nv25ajSSNQEwRnm5INkzpCMhtKwGZ16jLWMbDmsNu-z8IwrUdYry3EViq6OyzulMPTEe_0tS_jgfVPsaSGTyR8xXxZprGbsVeFlXa0OOYdwddPKxZIJCk_MJDuVXCbghrpQZgsXFXRriXaZAGf9tmW4Gl6lSC2HVUvv_1--jEC2eqAzFBn0J3IVvGUxaSKhuAR1-W4QvJtLX0NSLcHWqTguqnNJ7W3vgRn1ARs16T1gU8uEs_DJN8L');">
</div>
<!-- Top Navigation Controls -->
<div class="absolute top-0 left-0 right-0 px-6 py-12 flex justify-between items-start z-30 pointer-events-none">
<button class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-xl border border-white/20 flex items-center justify-center text-white active:scale-95 transition-transform duration-200 pointer-events-auto hover:bg-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.12)]">
<span class="material-symbols-outlined" style="font-size: 24px;">close</span>
</button>
<button class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-xl border border-white/20 flex items-center justify-center text-white active:scale-95 transition-transform duration-200 pointer-events-auto hover:bg-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.12)]">
<span class="material-symbols-outlined" style="font-size: 24px;">flashlight_on</span>
</button>
</div>
<!-- Main Scanner Interface -->
<div class="absolute inset-0 z-20 flex flex-col items-center justify-center pointer-events-none">
<!-- Center Cutout (The Frame) -->
<div class="relative w-[70vw] max-w-[340px] aspect-square rounded-xl scanner-cutout pointer-events-auto">
<!-- Contextual Text (Above Frame) -->
<div class="absolute -top-16 left-0 right-0 text-center flex flex-col items-center justify-end">
<h1 class="font-headline text-[24px] leading-8 font-semibold text-white tracking-tight drop-shadow-md">
                    Scan QR Code
                </h1>
</div>
<!-- Frame Bracket: Top Left -->
<div class="absolute top-0 left-0 w-10 h-10 border-t-[3px] border-l-[3px] border-white rounded-tl-xl drop-shadow-sm"></div>
<!-- Frame Bracket: Top Right -->
<div class="absolute top-0 right-0 w-10 h-10 border-t-[3px] border-r-[3px] border-white rounded-tr-xl drop-shadow-sm"></div>
<!-- Frame Bracket: Bottom Left -->
<div class="absolute bottom-0 left-0 w-10 h-10 border-b-[3px] border-l-[3px] border-white rounded-bl-xl drop-shadow-sm"></div>
<!-- Frame Bracket: Bottom Right -->
<div class="absolute bottom-0 right-0 w-10 h-10 border-b-[3px] border-r-[3px] border-white rounded-br-xl drop-shadow-sm"></div>
<!-- Animated Scanning Laser -->
<div class="absolute left-4 right-4 h-[2px] bg-accent-warm shadow-[0_0_12px_3px_rgba(212,175,55,0.4)] rounded-full animate-scanline z-30"></div>
<!-- Helper Text (Below Frame) -->
<div class="absolute -bottom-28 left-1/2 -translate-x-1/2 w-[140%] text-center px-4">
<p class="font-body text-[15px] leading-6 font-normal text-white/80 drop-shadow-sm max-w-[280px] mx-auto">
                    Align the QR code within the frame to join your leader's team automatically.
                </p>
</div>
</div>
</div>
<!-- Bottom Action Area -->
<div class="absolute bottom-12 left-0 right-0 flex justify-center z-30 pointer-events-none pb-safe">
<button class="font-label text-[14px] leading-5 font-semibold tracking-wider uppercase text-white px-8 py-3 rounded-full hover:bg-white/10 active:bg-white/20 transition-all duration-200 pointer-events-auto border border-transparent hover:border-white/20">
            Enter code manually
        </button>
</div>
</body></html>

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center">
<div class="w-full max-w-md bg-surface min-h-screen relative flex flex-col shadow-sm">
<!-- Top App Bar (Intent: Linear/Transactional - Suppress main navigation shell, but provide back action) -->
<header class="flex items-center justify-between px-5 h-16 w-full max-w-container-max mx-auto bg-surface/80 backdrop-blur-md sticky top-0 z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/30 transition-colors duration-200 active:scale-95 text-on-surface-variant">
<span class="material-symbols-outlined text-[24px]">chevron_left</span>
</button>
<h1 class="font-headline font-medium text-[20px] text-primary tracking-tight">Reset Password</h1>
<div class="w-10"></div> <!-- Placeholder for balance -->
</header>
<!-- Step Indicator -->
<div class="flex justify-center items-center space-x-2 py-4">
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
</div>
<main class="flex-1 px-5 pt-4 pb-8 flex flex-col gap-8">
<!-- Context Section -->
<section>
<h2 class="font-headline text-headline-sm text-on-surface mb-2">Check your email</h2>
<p class="font-body text-body-md text-on-surface-variant">We've sent a 6-digit code to your email. Enter it below to verify your identity.</p>
</section>
<!-- OTP Section -->
<section class="flex flex-col gap-4">
<div class="flex justify-between items-center gap-2">
<input class="otp-input w-12 h-14 rounded-md border border-slate-300 bg-slate-100 text-[24px] font-medium text-primary focus:border-primary focus:ring-1 focus:ring-primary transition-all" maxlength="1" type="text" value="4"/>
<input class="otp-input w-12 h-14 rounded-md border border-slate-300 bg-slate-100 text-[24px] font-medium text-primary focus:border-primary focus:ring-1 focus:ring-primary transition-all" maxlength="1" type="text" value="8"/>
<input class="otp-input w-12 h-14 rounded-md border border-slate-300 bg-slate-100 text-[24px] font-medium text-primary focus:border-primary focus:ring-1 focus:ring-primary transition-all" maxlength="1" type="text" value="2"/>
<input class="otp-input w-12 h-14 rounded-md border border-slate-300 bg-slate-100 text-[24px] font-medium text-primary focus:border-primary focus:ring-1 focus:ring-primary transition-all" maxlength="1" type="text" value=""/>
<input class="otp-input w-12 h-14 rounded-md border border-slate-300 bg-slate-100 text-[24px] font-medium text-primary focus:border-primary focus:ring-1 focus:ring-primary transition-all" maxlength="1" type="text" value=""/>
<input class="otp-input w-12 h-14 rounded-md border border-slate-300 bg-slate-100 text-[24px] font-medium text-primary focus:border-primary focus:ring-1 focus:ring-primary transition-all" maxlength="1" type="text" value=""/>
</div>
<div class="flex justify-between items-center px-1">
<span class="text-[12px] font-body text-slate-500">Resend code in 00:24</span>
<button class="text-[14px] font-label font-semibold text-primary opacity-50 cursor-not-allowed">Resend</button>
</div>
</section>
<!-- New Password Section -->
<section class="flex flex-col gap-6 mt-4">
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="font-label text-label-md text-on-surface">New Password</label>
<div class="relative">
<input class="w-full h-[52px] px-4 rounded-lg border border-outline-variant bg-surface-container-lowest text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="Enter new password" type="password" value="str0ngP@ss"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<!-- Strength Meter -->
<div class="flex flex-col gap-1 mt-1">
<div class="flex gap-1 h-1.5 w-full rounded-full overflow-hidden">
<div class="h-full w-1/4 bg-primary transition-all duration-300"></div>
<div class="h-full w-1/4 bg-primary transition-all duration-300"></div>
<div class="h-full w-1/4 bg-primary transition-all duration-300"></div>
<div class="h-full w-1/4 bg-surface-variant transition-all duration-300"></div>
</div>
<div class="flex justify-between items-center px-1">
<span class="text-[12px] font-body text-primary font-medium">Strong</span>
<span class="text-[12px] font-body text-on-surface-variant">Min. 8 characters</span>
</div>
</div>
</div>
<!-- Confirm Password Input -->
<div class="flex flex-col gap-2">
<label class="font-label text-label-md text-on-surface">Confirm Password</label>
<div class="relative">
<input class="w-full h-[52px] px-4 rounded-lg border border-outline-variant bg-surface-container-lowest text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="Re-enter password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
</section>
<!-- Spacer -->
<div class="flex-1"></div>

<button class="w-full h-[56px] rounded-lg bg-primary text-on-primary font-label text-label-md flex items-center justify-center hover:bg-primary-container hover:text-on-primary-container transition-colors duration-200 active:scale-[0.98]">
                Set New Password
            </button>
</main>
<!-- Success Overlay (Hidden State Example) -->
<div class="hidden absolute inset-0 bg-surface/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center px-5 animate-[fadeIn_0.3s_ease-out]" id="success-overlay">
<div class="bg-surface-container-lowest w-full max-w-sm rounded-xl p-8 shadow-xl border border-border-subtle flex flex-col items-center text-center gap-4 transform transition-transform scale-95">
<div class="w-16 h-16 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-[32px]">check_circle</span>
</div>
<h3 class="font-headline text-headline-sm text-on-surface">Password updated!</h3>
<p class="font-body text-body-md text-on-surface-variant mb-4">Your password has been changed successfully. You can now log in with your new password.</p>
<button class="w-full h-[48px] rounded-lg bg-primary text-on-primary font-label text-label-md flex items-center justify-center hover:bg-primary-container hover:text-on-primary-container transition-colors duration-200">
                    Back to Login
                </button>
</div>
</div>
</div>
<script>
        // Simple script to auto-focus next OTP input
        const otpInputs = document.querySelectorAll('.otp-input');
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
        });

        // Demo function to show success overlay (bind to CTA if needed)
        function showSuccess() {
            const overlay = document.getElementById('success-overlay');
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.querySelector('div').classList.remove('scale-95');
                overlay.querySelector('div').classList.add('scale-100');
            }, 50);
        }
    </script>

name: distributor_os
description: Ascendra MLM Leadership Platform
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase — database, auth, realtime, storage
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Data models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # HTTP client for NestJS backend
  dio: ^5.8.0+1

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Notifications and alarms
  flutter_local_notifications: ^18.0.1

  # Permissions
  permission_handler: ^11.4.0

  # File uploads (task proof, documents)
  image_picker: ^1.1.2
  file_picker: ^10.1.9

  # Image display
  cached_network_image: ^3.4.1

  # Date formatting
  intl: ^0.20.2

  # UUID generation
  uuid: ^4.5.1

  # Network detection
  connectivity_plus: ^6.1.4
  hmssdk_flutter: ^1.11.1
  video_player: ^2.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation — must run: dart run build_runner build
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.5
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  mockito: ^5.4.6

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/branding/ascendra_logo.png"

flutter_native_splash:
  color: "#000000"
  image: "assets/branding/ascendra_logo.png"
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
